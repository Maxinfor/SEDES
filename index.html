<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda do Concurseiro - Painel Administrativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        /* Estilo Glassmorphism */
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #74ebd5, #9face6); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-container { width: 100%; max-width: 1000px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 20px; padding: 30px; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .panel { background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 15px; }
        button { cursor: pointer; border: none; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-acao { background: #27ae60; color: white; }
        .btn-alerta { background: #e67e22; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Agenda de Estudo do Concurseiro - Painel Administrativo 📖</h2>
    
    <div class="grid">
        <div class="panel">
            <h3>Bem-Estar</h3>
            <button class="btn-alerta" onclick="alert('💦 Hidrate-se: Beba um copo de água agora!')">Beber Água</button>
            <button class="btn-alerta" onclick="alert('🧘 Pausa de 10 min: Desconecte-se, alongue-se ou relaxe.')">Pausa 10 min</button>
            <button class="btn-alerta" onclick="marcarRefeicao('Almoço')">Marcar Almoço</button>
        </div>

        <div class="panel">
            <h3>Cronômetro (Pomodoro)</h3>
            <div id="displayTempo" style="font-size: 1.5rem; text-align: center;">00:00</div>
            <button class="btn-acao" onclick="iniciarPomodoro()">Iniciar</button>
        </div>
    </div>

    <div style="display: flex; gap: 10px;">
        <button class="btn-acao" onclick="alert('Sessão Salva com Sucesso!')">SALVAR SESSÃO</button>
        <button onclick="document.getElementById('pdfInput').click()">CARREGAR EDITAL</button>
        <input type="file" id="pdfInput" style="display:none" onchange="processarEdital(this)">
    </div>
</div>

<script>
    // Lógica de Bem-Estar
    function marcarRefeicao(tipo) { alert(tipo + " registrado! Mantenha o foco."); }

    // Lógica de Cronômetro
    let tempo = 0;
    function iniciarPomodoro() {
        setInterval(() => {
            tempo++;
            let m = Math.floor(tempo/60).toString().padStart(2, '0');
            let s = (tempo%60).toString().padStart(2, '0');
            document.getElementById('displayTempo').innerText = `${m}:${s}`;
            if(tempo === 1500) alert("⏰ 25 minutos! Hora da pausa de 10 minutos.");
        }, 1000);
    }

    // Lógica de PDF (Simples)
    function processarEdital(input) {
        alert("Processando edital: " + input.files[0].name + "...");
    }
</script>

</body>
</html>
