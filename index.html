<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Agenda do Concurseiro - Edital</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 150px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Analisar Conteúdo do Edital</h2>
    <input type="file" id="pdfUpload" accept="application/pdf">
    <input type="text" id="cargoBusca" placeholder="Digite o nome do cargo">
    <button onclick="extrairTexto()">Buscar Conteúdo do Cargo</button>
    <textarea id="resultadoEdital" placeholder="O conteúdo aparecerá aqui..."></textarea>
</div>

<script>
    // Configura o worker do PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function extrairTexto() {
        const file = document.getElementById('pdfUpload').files[0];
        const cargo = document.getElementById('cargoBusca').value.toLowerCase();
        
        if (!file) return alert("Selecione um PDF primeiro.");

        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            const pdf = await pdfjsLib.getDocument(typedarray).promise;
            let textoCompleto = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                textoCompleto += content.items.map(s => s.str).join(" ");
            }

            // Lógica de busca: encontra o cargo e extrai o trecho até o fim da página ou seção
            const index = textoCompleto.toLowerCase().indexOf(cargo);
            if (index !== -1) {
                document.getElementById('resultadoEdital').value = "Conteúdo encontrado:\n" + textoCompleto.substring(index, index + 1000);
            } else {
                alert("Cargo não encontrado no documento.");
            }
        };
        reader.readAsArrayBuffer(file);
    }
</script>
</body>
</html>
