<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo Concurseiro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #0f2027, #2c5364); font-family: 'Segoe UI', sans-serif; color: white; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-container { width: 100%; max-width: 1100px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .grid-topo { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px; }
        .panel { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 15px; }
        .btn-salvar { background: #27ae60; padding: 12px; width: 100%; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .dashboard-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .card-registro { background: rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 15px; position: relative; }
        .chart-container { height: 40px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Agenda de Estudo do Concurseiro - Painel Administrativo 📖</h2>

    <div class="grid-topo">
        <div class="panel">Sessão<br><select><option>Estudo</option><option>Revisão</option></select></div>
        <div class="panel">Disciplina<br><select><option>D. Constitucional</option></select></div>
        <div class="panel">Revisão<br><select><option>2 Dias</option><option>1 Semana</option></select></div>
        <div class="panel">Extra<br><input type="text" placeholder="Resumo/Questões"></div>
        <div class="panel">Data<br><input type="date"></div>
    </div>

    <button class="btn-salvar" onclick="alert('Salvo no seu painel!')">SALVAR SESSÃO</button>

    <div class="dashboard-list">
        <div class="card-registro">
            Marcos - D. Admin
            <div class="chart-container"><canvas id="chart1"></canvas></div>
        </div>
        <div class="card-registro">
            Sandra - Português
            <div class="chart-container"><canvas id="chart2"></canvas></div>
        </div>
        <div class="card-registro">
            Ana - Informática
            <div class="chart-container"><canvas id="chart3"></canvas></div>
        </div>
        <div class="card-registro">
            Sheila - Simulado
            <div class="chart-container"><canvas id="chart4"></canvas></div>
        </div>
    </div>
</div>

<script>
    // Configuração dos gráficos
    const configs = [chart1, chart2, chart3, chart4];
    configs.forEach((id, index) => {
        new Chart(id, {
            type: 'line',
            data: { labels: [1,2,3,4], datasets: [{ data: [10, 20, 15, 30], borderColor: '#3498db', fill: false }] },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    });
</script>
</body>
</html>
